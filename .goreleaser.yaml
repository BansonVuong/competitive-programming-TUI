version: 2

project_name: cptui

before:
  hooks:
    - go mod tidy

builds:
  - id: cptui
    main: .
    binary: cptui
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: cptui-archive
    ids:
      - cptui
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - problems/**
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: BansonVuong
    name: competitive-programming-TUI
