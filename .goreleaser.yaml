version: 2

project_name: cptui

before:
  hooks:
    - go mod tidy

builds:
  - id: cptui
    main: .
    binary: cptui
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: cptui-archive
    ids:
      - cptui
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - problems/**
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: BansonVuong
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/BansonVuong/competitive-programming-TUI
    description: Terminal UI for testing competitive programming solutions.
    dependencies:
      - name: gcc

scoops:
  - repository:
      owner: BansonVuong
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/BansonVuong/competitive-programming-TUI
    description: Terminal UI for testing competitive programming solutions.
    license: MIT

release:
  github:
    owner: BansonVuong
    name: competitive-programming-TUI
